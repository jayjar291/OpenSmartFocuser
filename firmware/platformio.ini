; OpenSmartFocuser — PlatformIO Configuration
; https://docs.platformio.org/page/projectconf.html

[env:esp32s3]
; Build target and framework configuration for ESP32-S3 firmware.
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino

; Serial monitor speed for runtime logs.
monitor_speed = 115200
monitor_filters = send_on_enter
monitor_echo = yes
monitor_eol = CRLF

; Core runtime libraries: display, motion planning, and TMC2209 control.
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    gin66/FastAccelStepper
    teemuatlut/TMCStepper @ ^0.7.3
    the-young-maker/OpenMenuOS

; Compile-time defines and TFT_eSPI setup injection.
build_flags =
    -D VERSION=\"0.1.0\"
    -D SMOOTH_FONT
    -D USER_SETUP_LOADED=1
    -include include/TFT_eSPI_Setup.h
